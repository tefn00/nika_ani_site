<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wellex | Social</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-home whoop-home topic-page">
<div class="page-photo-backdrop" aria-hidden="true">
  <img src="assets/wellex_front_back.jpg" alt="">
</div>

<header data-shared-header data-active-page="social"></header>

<section class="section whoop-social-section" id="social">
  <div class="whoop-social-grid">
    <div class="whoop-social-copy">
      <div class="section-label">Social Media</div>
      <h2 class="section-title">Social makes the brand feel alive.</h2>
      <p class="section-sub">
        Short phrases. Strong energy. Product first.
      </p>
      <div class="whoop-social-pills">
        <span>Instagram</span>
        <span>X / Twitter</span>
        <span>Wearable culture</span>
      </div>
    </div>
    <figure class="whoop-social-media">
      <img src="assets/wellex-social-media.png" alt="Wellex social media mockups">
    </figure>
  </div>
</section>

<section class="section whoop-cta-section" id="join">
  <div class="whoop-cta-shell">
    <div>
      <div class="section-label">Join Wellex</div>
      <h2>Bring social back to the product.</h2>
      <p>
        Use energy to drive product interest.
      </p>
    </div>
    <div class="whoop-cta-actions">
      <a href="product.html?color=classic-black" class="btn-primary" data-fit-launch="classic-black">Choose Your Watch</a>
      <a href="how-it-works.html" class="btn-outline">See Product Flow</a>
    </div>
  </div>
</section>

<footer data-shared-footer></footer>

<script src="js/main.js"></script>
</body>
</html>
